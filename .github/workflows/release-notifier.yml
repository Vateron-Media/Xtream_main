name: Release Notifier

on:
  push:
    tags:
      - 'v*'

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Get Release Info
        id: release_info
        run: |
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          echo "tag_name=$RELEASE_TAG" >> $GITHUB_ENV
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" >> $GITHUB_ENV
          echo "compare_url=https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...$RELEASE_TAG" >> $GITHUB_ENV

      - name: Send Release Notification to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          MESSAGE="🔔 *New Release Published* 🔔\n\n"
          MESSAGE+="📦 *Repository:* [${{ github.repository }}](https://github.com/${{ github.repository }})\n"
          MESSAGE+="🏷️ *Version:* \`${{ env.tag_name }}\`\n"
          MESSAGE+="📄 *Changelog:* [View Changes](${{ env.compare_url }})\n\n"
          MESSAGE+="🔗 [View Release](${{ env.release_url }})"

          # Экранирование символов для MarkdownV2
          ESCAPED_MSG=$(echo "$MESSAGE" | sed -E 's/([_*\[\]()~`>#+\-=|{}.!])/\\\1/g')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"$CHAT_ID\",
              \"message_thread_id\": \"$TOPIC_ID\",
              \"text\": \"$ESCAPED_MSG\",
              \"parse_mode\": \"MarkdownV2\"
            }" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendMessage"
