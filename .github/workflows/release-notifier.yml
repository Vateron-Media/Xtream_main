name: Release Notifier

on:
  push:
    tags:
      - 'v*'

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send release notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          RELEASE_TYPE="Release"
          if [ "${{ github.event.release.prerelease }}" == "true" ]; then
            RELEASE_TYPE="Prerelease"
          fi

          AUTHOR_NAME="${{ github.actor }}"

          MESSAGE="🔔 *${RELEASE_TYPE} Published* 🔔\n\n"
          MESSAGE+="📦 *Repository:* [${{ github.repository }}](https://github.com/${{ github.repository }})\n"
          MESSAGE+="🏷️ *Version:* \`${{ github.ref_name }}\`\n"
          MESSAGE+="📛 *Title:* ${{ github.event.release.name }}\n"
          MESSAGE+="👤 *Author:* [$AUTHOR_NAME](https://github.com/$AUTHOR_NAME)\n\n"
          MESSAGE+="📄 *Release Notes:*\n"
          MESSAGE+="${{ github.event.release.body }}\n\n"
          MESSAGE+="🔗 [View on GitHub](${{ github.event.release.html_url }})\n"
          MESSAGE+="⏱️ Published at: ${{ github.event.release.published_at }}"

          # Экранирование специальных символов для Telegram MarkdownV2
          ESCAPED_MSG=$(echo "$MESSAGE" | sed -E 's/([_*\[\]()~`>#+\-=|{}.!])/\\\1/g')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"$CHAT_ID\",
              \"message_thread_id\": \"$TOPIC_ID\",
              \"text\": \"$ESCAPED_MSG\",
              \"parse_mode\": \"MarkdownV2\"
            }" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendMessage"
